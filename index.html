function NumberField({ label, value, onChange, unit, step = 1, min = 0, hint }) {
  return (
    <label className="block">
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">{label}</span>
        {hint && <span className="text-[10px] text-neutral-600">{hint}</span>}
      </div>
      <div className="flex items-center bg-neutral-900 border border-neutral-800 rounded-sm focus-within:border-[color:var(--red)] transition-colors">
        <input
          type="number"
          value={value}
          step={step}
          min={min}
          onChange={(e) => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value))}
          className="w-full bg-transparent px-3 py-2.5 text-white font-mono text-[15px] outline-none"
        />
        <span className="pr-3 text-neutral-500 text-[13px] font-mono">{unit}</span>
      </div>
    </label>
  );
}

function ResultRow({ label, value, unit, big }) {
  return (
    <div className="flex items-baseline justify-between py-2.5 border-b border-neutral-800 last:border-0">
      <span className="text-[12px] uppercase tracking-wide text-neutral-400">{label}</span>
      <span className={big ? "text-2xl font-mono font-bold text-white" : "text-[15px] font-mono text-white"}>
        {value} <span className="text-[12px] text-[color:var(--red)] font-sans font-semibold">{unit}</span>
      </span>
    </div>
  );
}

function SectionLabel({ n, title }) {
  return (
    <div className="flex items-center gap-2 mb-3">
      <span className="text-[11px] font-mono text-[color:var(--red)]">{n}</span>
      <span className="text-[11px] uppercase tracking-[0.15em] text-neutral-500 font-semibold">{title}</span>
      <div className="flex-1 h-px bg-neutral-800" />
    </div>
  );
}

function fmt(n, d = 1) {
  if (!isFinite(n)) return "—";
  return n.toLocaleString("de-DE", { minimumFractionDigits: d, maximumFractionDigits: d });
}


function Minus({ size = 16, color = "#666" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><line x1="5" y1="12" x2="19" y2="12" stroke={color} strokeWidth="2.5" strokeLinecap="round" /></svg>;
}
function Circle({ size = 16, color = "#666" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke={color} strokeWidth="2.5" /></svg>;
}
function Triangle({ size = 16, color = "#666" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><polygon points="12,4 21,20 3,20" stroke={color} strokeWidth="2.5" strokeLinejoin="round" /></svg>;
}
function ChevronDown({ size = 15, color = "#888", className = "" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className={className}><polyline points="6,9 12,15 18,9" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" /></svg>;
}
function Info({ size = 13, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className={className}>
      <circle cx="12" cy="12" r="9" stroke="#666" strokeWidth="2" />
      <line x1="12" y1="11" x2="12" y2="16" stroke="#666" strokeWidth="2" strokeLinecap="round" />
      <circle cx="12" cy="7.5" r="1.1" fill="#666" />
    </svg>
  );
}

  const [k_durchmesser, setKDurchmesser] = useState(2000);
  const [k_hoehe, setKHoehe] = useState(1500);
  const [k_deck, setKDeck] = useState(400);

  // Oval
  const [o_laenge, setOLaenge] = useState(3000);
  const [o_breite, setOBreite] = useState(2000);
  const [o_hoehe, setOHoehe] = useState(1500);
  const [o_deck, setODeck] = useState(400);

  // Kegel
  const [c_durchUnten, setCDurchUnten] = useState(2000);
  const [c_durchOben, setCDurchOben] = useState(0);
  const [c_hoehe, setCHoehe] = useState(1800);
  const [c_deck, setCDeck] = useState(400);

  const gerade = useMemo(() => {
    const achsmass = g_deck + luftspalt;
    const n = Math.max(1, Math.round(g_breite / achsmass));
    const deckAngepasst = g_breite / n - luftspalt;
    const zuschnitt = deckAngepasst + falzUnten + falzOben;
    const zuschnittEnde = deckAngepasst + falzUnten + falzUnten;
    return { n, deckAngepasst, zuschnitt, zuschnittEnde };
  }, [g_breite, g_deck, luftspalt, falzUnten, falzOben]);

  const kreis = useMemo(() => {
    const r = k_durchmesser / 2;
    const umfang = 2 * Math.PI * r;
    const achsmass = k_deck + luftspalt;
    const n = Math.max(3, Math.round(umfang / achsmass));
    const deckAngepasst = umfang / n - luftspalt;
    const zuschnitt = deckAngepasst + falzUnten + falzOben;
    return { r, umfang, n, deckAngepasst, zuschnitt };
  }, [k_durchmesser, k_deck, luftspalt, falzUnten, falzOben]);

  const oval = useMemo(() => {
    const a = o_laenge / 2;
    const b = o_breite / 2;
    // Ramanujan-Näherung 2. Ordnung
    const h = Math.pow((a - b), 2) / Math.pow((a + b), 2);
    const umfang = Math.PI * (a + b) * (1 + (3 * h) / (10 + Math.sqrt(4 - 3 * h)));
    const achsmass = o_deck + luftspalt;
    const n = Math.max(4, Math.round(umfang / achsmass));
    const deckAngepasst = umfang / n - luftspalt;
    const zuschnitt = deckAngepasst + falzUnten + falzOben;
    return { a, b, umfang, n, deckAngepasst, zuschnitt };
  }, [o_laenge, o_breite, o_deck, luftspalt, falzUnten, falzOben]);

  const kegel = useMemo(() => {
    const r1 = c_durchUnten / 2;
    const r2 = c_durchOben / 2;
    const h = c_hoehe;
    const deltaR = r1 - r2;
    const isZylinder = Math.abs(deltaR) < 0.5;
    const s = isZylinder ? h : Math.sqrt(h * h + deltaR * deltaR);
    let L1 = null, L2 = null;
    if (!isZylinder) {
      L1 = (s * r1) / deltaR;
      L2 = L1 - s;
    }
    const umfangUnten = 2 * Math.PI * r1;
    const umfangOben = 2 * Math.PI * r2;
    const achsmassUnten = c_deck + luftspalt;
    const n = Math.max(3, Math.round(umfangUnten / achsmassUnten));
    const deckUnten = umfangUnten / n - luftspalt;
    const deckOben = r1 > 0 ? deckUnten * (r2 / r1) : 0;
    const zuschnittUnten = deckUnten + falzUnten + falzOben;
    const zuschnittOben = r2 > 0 ? deckOben + falzUnten + falzOben : 0;
    const sagittaUnten = L1 ? Math.pow(deckUnten, 2) / (8 * L1) : 0;
    const sagittaOben = L2 && L2 > 0 ? Math.pow(deckOben, 2) / (8 * L2) : 0;
    return { r1, r2, s, isZylinder, umfangUnten, umfangOben, n, deckUnten, deckOben, zuschnittUnten, zuschnittOben, sagittaUnten, sagittaOben };
  }, [c_durchUnten, c_durchOben, c_hoehe, c_deck, luftspalt, falzUnten, falzOben]);

  const tabs = [
    { id: "gerade", label: "Gerade", icon: Minus },
    { id: "kreis", label: "Kreis", icon: Circle },
    { id: "oval", label: "Oval", icon: Circle },
    { id: "kegel", label: "Kegel", icon: Triangle },
  ];

  return (
    <div style={{ "--red": RED }} className="min-h-screen bg-black text-white" >
      <style>{`
        ${FONT_IMPORT}
        .display { font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif; letter-spacing: 0.04em; }
        * { font-family: 'Barlow', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @media print {
          .no-print { display: none !important; }
          .print-only { display: block !important; }
          body, .min-h-screen { background: white !important; }
          * { color: black !important; border-color: #ccc !important; background: white !important; box-shadow: none !important; }
          svg text { fill: black !important; }
          svg line, svg polyline, svg path, svg circle, svg ellipse, svg polygon, svg rect { stroke: black !important; }
          .display span { color: black !important; }
        }
      `}</style>

      {/* Header */}
      <div className="border-b border-neutral-800 px-5 pt-6 pb-4 relative overflow-hidden">
        <div className="absolute top-0 right-0 w-40 h-40 opacity-[0.06] no-print" style={{ background: `radial-gradient(circle, ${RED}, transparent 70%)` }} />
        <div className="flex items-center gap-3 justify-between">
          <div className="flex items-center gap-3">
            <img src={`data:image/png;base64,${LOGO_B64}`} alt="Sominka Dach Logo" className="w-14 h-14 shrink-0" />
            <div>
              <div className="text-[11px] tracking-[0.3em] text-neutral-500 mb-1">SOMINKA DACH · KLEMPNERTECHNIK</div>
              <h1 className="display text-4xl leading-none">
                STEHFALZ <span style={{ color: RED }}>ZUSCHNITT</span>
              </h1>
            </div>
          </div>
          <button onClick={() => window.print()} className="no-print shrink-0 text-[11px] uppercase tracking-wide border border-neutral-700 rounded-sm px-3 py-2 text-neutral-300">Drucken</button>
        </div>
        <div className="no-print mt-3">
          <input
            value={projekt}
            onChange={(e) => setProjekt(e.target.value)}
            placeholder="Projektname (für Ausdruck)"
            className="w-full bg-neutral-900 border border-neutral-800 rounded-sm px-3 py-2 text-white text-[13px] outline-none focus:border-[color:var(--red)]"
          />
        </div>
        <div className="print-only hidden mt-2 text-[12px]">
          Projekt: {projekt || "—"} · Datum: {heute} · Sominka Dach
        </div>
      </div>

      {/* Tabs */}
      <div className="no-print flex border-b border-neutral-800 sticky top-0 bg-black z-10">
        {tabs.map((t) => {
          const Icon = t.icon;
          const active = tab === t.id;
          return (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              className="flex-1 flex flex-col items-center gap-1 py-3 relative"
            >
              <Icon size={16} color={active ? RED : "#666"} strokeWidth={2} />
              <span className={`text-[11px] uppercase tracking-wide ${active ? "text-white font-semibold" : "text-neutral-500"}`}>{t.label}</span>
              {active && <div className="absolute bottom-0 left-0 right-0 h-[2px]" style={{ background: RED }} />}
            </button>
          );
        })}
      </div>

      <div className="px-5 py-5 space-y-6 pb-16">
        {/* Gemeinsame Falz-Einstellungen */}
        <div className="border border-neutral-800 rounded-sm">
          <button onClick={() => setShowFalz(!showFalz)} className="w-full flex items-center justify-between px-4 py-3">
            <span className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Falz &amp; Luftspalt anpassen</span>
            <ChevronDown size={15} color="#888" className={`transition-transform ${showFalz ? "rotate-180" : ""}`} />
          </button>
          {showFalz && (
            <div className="px-4 pb-4 space-y-4">
              <div className="grid grid-cols-3 gap-3">
                <NumberField label="Unterfalz" unit="mm" value={falzUnten} onChange={setFalzUnten} />
                <NumberField label="Oberfalz" unit="mm" value={falzOben} onChange={setFalzOben} />
                <NumberField label="Luftspalt" unit="mm" value={luftspalt} onChange={setLuftspalt} step={0.5} />
              </div>
              <FalzProfilViz falzUnten={falzUnten} falzOben={falzOben} luftspalt={luftspalt} />
            </div>
          )}
        </div>

        {tab === "gerade" && (
          <>
            <div>
              <SectionLabel n="01" title="Maße gerade Strecke" />
              <div className="grid grid-cols-2 gap-3">
                <NumberField label="Gesamtbreite" unit="mm" value={g_breite} onChange={setGBreite} />
                <NumberField label="Deckbreite Ziel" unit="mm" value={g_deck} onChange={setGDeck} />
                <NumberField label="Bahnlänge" unit="mm" value={g_hoehe} onChange={setGHoehe} />
              </div>
            </div>
            <StraightViz n={gerade.n} />
            <div>
              <SectionLabel n="02" title="Ergebnis" />
              <div className="bg-neutral-900/50 border border-neutral-800 rounded-sm px-4">
                <ResultRow label="Anzahl Bahnen" value={gerade.n} unit="Stk" big />
                <ResultRow label="Deckbreite angepasst" value={fmt(gerade.deckAngepasst)} unit="mm" />
                <ResultRow label="Zuschnittbreite Innenbahnen" value={fmt(gerade.zuschnitt)} unit="mm" />
                <ResultRow label="Zuschnittbreite letzte Bahn" value={fmt(gerade.zuschnittEnde)} unit="mm" />
                <ResultRow label="Kontrolle Gesamt" value={fmt(gerade.n * (gerade.deckAngepasst + luftspalt))} unit="mm" />
              </div>
              <p className="text-[11px] text-neutral-600 mt-3 flex gap-1.5"><Info size={13} className="shrink-0 mt-0.5" /> Alle Bahnen außer der letzten bekommen Unterfalz + Oberfalz (Innenbahnen, Standard-Zugabe). Die erste Bahn hat ihre offene Kante von Haus aus schon als Unterfalz. Die letzte Bahn wird am offenen Ende statt mit Oberfalz-Haken ebenfalls mit einer Unterfalz-Lippe abgekantet — schmalere Zugabe, sauberer Randabschluss ohne offenen Haken.</p>
            </div>
            <MaterialBedarf n={gerade.n} breite={gerade.zuschnitt} laenge={g_hoehe} />
            <Stueckliste
              n={gerade.n}
              columns={[
                { label: "Breite (mm)", get: (i) => fmt(i === gerade.n - 1 ? gerade.zuschnittEnde : gerade.zuschnitt, 0) },
                { label: "Länge (mm)", get: () => fmt(g_hoehe, 0) },
                { label: "Typ", get: (i) => (i === gerade.n - 1 ? "Endbahn U+U" : "Innenbahn U+O") },
              ]}
            />
          </>
        )}

        {tab === "kreis" && (
          <>
            <div>
              <SectionLabel n="01" title="Maße Rundturm / Zylinder" />
              <div className="grid grid-cols-2 gap-3">
                <NumberField label="Durchmesser" unit="mm" value={k_durchmesser} onChange={setKDurchmesser} />
                <NumberField label="Höhe Bahn" unit="mm" value={k_hoehe} onChange={setKHoehe} />
                <NumberField label="Deckbreite Ziel" unit="mm" value={k_deck} onChange={setKDeck} />
              </div>
              <p className="text-[11px] text-neutral-600 mt-2 flex gap-1.5"><Info size={13} className="shrink-0 mt-0.5" /> Für senkrechten Zylinder (z.&nbsp;B. Rundturm-Wand). Für eine Haube mit Neigung den Kegel-Tab nutzen.</p>
            </div>
            <CircleViz n={kreis.n} />
            <div>
              <SectionLabel n="02" title="Ergebnis" />
              <div className="bg-neutral-900/50 border border-neutral-800 rounded-sm px-4">
                <ResultRow label="Umfang" value={fmt(kreis.umfang)} unit="mm" />
                <ResultRow label="Anzahl Bahnen" value={kreis.n} unit="Stk" big />
                <ResultRow label="Deckbreite angepasst" value={fmt(kreis.deckAngepasst)} unit="mm" />
                <ResultRow label="Zuschnittbreite (flach)" value={fmt(kreis.zuschnitt)} unit="mm" />
                <ResultRow label="Zuschnitthöhe" value={fmt(k_hoehe)} unit="mm" />
              </div>
            </div>
            <MaterialBedarf n={kreis.n} breite={kreis.zuschnitt} laenge={k_hoehe} />
            <Stueckliste
              n={kreis.n}
              columns={[
                { label: "Breite (mm)", get: () => fmt(kreis.zuschnitt, 0) },
                { label: "Länge (mm)", get: () => fmt(k_hoehe, 0) },
              ]}
            />
          </>
        )}

        {tab === "oval" && (
          <>
            <div>
              <SectionLabel n="01" title="Maße Oval / Ellipse" />
              <div className="grid grid-cols-2 gap-3">
                <NumberField label="Länge (lang)" unit="mm" value={o_laenge} onChange={setOLaenge} />
                <NumberField label="Breite (kurz)" unit="mm" value={o_breite} onChange={setOBreite} />
                <NumberField label="Höhe Bahn" unit="mm" value={o_hoehe} onChange={setOHoehe} />
                <NumberField label="Deckbreite Ziel" unit="mm" value={o_deck} onChange={setODeck} />
              </div>
              <p className="text-[11px] text-neutral-600 mt-2 flex gap-1.5"><Info size={13} className="shrink-0 mt-0.5" /> Umfang per Ramanujan-Näherung. Deckbreite ist ein gemittelter Wert — an den engen Rundungen (Scheitel) vor Ort nachmessen, da sich die Krümmung dort stärker ändert als an den Seiten.</p>
            </div>
            <OvalViz n={oval.n} a={oval.a} b={oval.b} />
            <div>
              <SectionLabel n="02" title="Ergebnis" />
              <div className="bg-neutral-900/50 border border-neutral-800 rounded-sm px-4">
                <ResultRow label="Umfang (Näherung)" value={fmt(oval.umfang)} unit="mm" />
                <ResultRow label="Anzahl Bahnen" value={oval.n} unit="Stk" big />
                <ResultRow label="Deckbreite angepasst Ø" value={fmt(oval.deckAngepasst)} unit="mm" />
                <ResultRow label="Zuschnittbreite (flach)" value={fmt(oval.zuschnitt)} unit="mm" />
                <ResultRow label="Zuschnitthöhe" value={fmt(o_hoehe)} unit="mm" />
              </div>
            </div>
            <MaterialBedarf n={oval.n} breite={oval.zuschnitt} laenge={o_hoehe} />
            <Stueckliste
              n={oval.n}
              columns={[
                { label: "Breite (mm) Ø", get: () => fmt(oval.zuschnitt, 0) },
                { label: "Länge (mm)", get: () => fmt(o_hoehe, 0) },
              ]}
              hinweis="Alle Bahnen mit gemittelter Breite — an den Scheiteln vor Ort prüfen."
            />
          </>
        )}

        {tab === "kegel" && (
          <>
            <div>
              <SectionLabel n="01" title="Maße Kegel / Turmhaube" />
              <div className="grid grid-cols-2 gap-3">
                <NumberField label="Durchmesser unten" unit="mm" value={c_durchUnten} onChange={setCDurchUnten} />
                <NumberField label="Durchmesser oben" unit="mm" value={c_durchOben} onChange={setCDurchOben} hint="0 = Spitze" />
                <NumberField label="Höhe" unit="mm" value={c_hoehe} onChange={setCHoehe} />
                <NumberField label="Deckbreite unten Ziel" unit="mm" value={c_deck} onChange={setCDeck} />
              </div>
            </div>
            <ConeViz n={kegel.n} r1={kegel.r1} r2={kegel.r2} s={kegel.s} />
            <div>
              <SectionLabel n="02" title="Ergebnis" />
              <div className="bg-neutral-900/50 border border-neutral-800 rounded-sm px-4">
                <ResultRow label="Mantellänge (Bahnlänge)" value={fmt(kegel.s)} unit="mm" big />
                <ResultRow label="Anzahl Bahnen" value={kegel.n} unit="Stk" />
                <ResultRow label="Umfang unten" value={fmt(kegel.umfangUnten)} unit="mm" />
                <ResultRow label="Deckbreite unten" value={fmt(kegel.deckUnten)} unit="mm" />
                <ResultRow label="Zuschnittbreite unten" value={fmt(kegel.zuschnittUnten)} unit="mm" />
                {kegel.r2 > 0 && (
                  <>
                    <ResultRow label="Deckbreite oben" value={fmt(kegel.deckOben)} unit="mm" />
                    <ResultRow label="Zuschnittbreite oben" value={fmt(kegel.zuschnittOben)} unit="mm" />
                  </>
                )}
              </div>
              <div className="mt-3 bg-neutral-900/30 border border-neutral-800 rounded-sm px-4 py-3">
                <p className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold mb-1.5">Bogenhöhe Kanten</p>
                <p className="text-[12px] text-neutral-300 leading-relaxed">
                  Unten: <span className="font-mono">{fmt(kegel.sagittaUnten, 2)} mm</span> · Oben: <span className="font-mono">{fmt(kegel.sagittaOben, 2)} mm</span>
                  {" — "}
                  {(kegel.sagittaUnten < 1.5 && kegel.sagittaOben < 1.5) ? "Kanten können gerade geschnitten werden." : "Ab ca. 1,5–2 mm Bogenhöhe die Kante leicht bombiert schneiden, sonst entsteht Spalt bzw. Überlappung."}
                </p>
              </div>
              <p className="text-[11px] text-neutral-600 mt-3 flex gap-1.5"><Info size={13} className="shrink-0 mt-0.5" /> Panele als Trapez schneiden: Breite unten / Breite oben laut Ergebnis, Länge = Mantellänge. Oberfalz-/Unterfalz-Zugabe ist bereits in den Zuschnittbreiten enthalten.</p>
            </div>
            <MaterialBedarf n={kegel.n} breite={kegel.zuschnittUnten} laenge={kegel.s} hinweis="Trapezform, Breite unten als Worst-Case angesetzt" />
            <Stueckliste
              n={kegel.n}
              columns={[
                { label: "Breite unten (mm)", get: () => fmt(kegel.zuschnittUnten, 0) },
                { label: "Breite oben (mm)", get: () => fmt(kegel.zuschnittOben, 0) },
                { label: "Länge (mm)", get: () => fmt(kegel.s, 0) },
              ]}
            />
          </>
        )}
      </div>
    </div>
  );
}

function StraightViz({ n }) {
  const w = 320, h = 60, pad = 10;
  const count = Math.min(n, 24);
  const bw = (w - pad * 2) / count;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-14">
      {Array.from({ length: count }).map((_, i) => (
        <rect key={i} x={pad + i * bw + 1} y={10} width={bw - 2} height={h - 20} fill="none" stroke={i % 2 === 0 ? RED : "#555"} strokeWidth="1.5" />
      ))}
    </svg>
  );
}

function CircleViz({ n }) {
  const size = 160, cx = size / 2, cy = size / 2, r = 65;
  const count = Math.min(n, 60);
  const lines = Array.from({ length: count }).map((_, i) => {
    const a = (i / count) * Math.PI * 2;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-40 mx-auto max-w-[200px] block">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#444" strokeWidth="1.5" />
      {lines.map(([x, y], i) => (
        <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={i % 3 === 0 ? RED : "#555"} strokeWidth="1" />
      ))}
    </svg>
  );
}

function OvalViz({ n, a, b }) {
  const size = 180, cx = size / 2, cy = 90;
  const scale = 65 / Math.max(a, b);
  const rx = a * scale, ry = b * scale;
  const count = Math.min(n, 60);
  const lines = Array.from({ length: count }).map((_, i) => {
    const ang = (i / count) * Math.PI * 2;
    return [cx + rx * Math.cos(ang), cy + ry * Math.sin(ang)];
  });
  return (
    <svg viewBox={`0 0 ${size} 180`} className="w-full h-40 mx-auto max-w-[200px] block">
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="none" stroke="#444" strokeWidth="1.5" />
      {lines.map(([x, y], i) => (
        <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={i % 3 === 0 ? RED : "#555"} strokeWidth="1" />
      ))}
    </svg>
  );
}

function FalzProfilViz({ falzUnten, falzOben, luftspalt }) {
  // Vollständiges Blech im Querschnitt, analog zur Referenzzeichnung:
  // links Unterfalz (25 + 10 mm), rechts Oberfalz (25 + 11 + 9 mm Haken).
  const s = 2; // px je mm
  const baseY = 190;
  const leftX = 110;
  const rightX = 430;

  const lUp = 25 * s;
  const lLip = 10 * s;
  const rUp = 25 * s;
  const rTop = 11 * s;
  const rHook = 9 * s;

  const pL1 = [leftX, baseY];
  const pL2 = [leftX, baseY - lUp];
  const pL3 = [leftX + lLip, baseY - lUp];

  const pR1 = [rightX, baseY];
  const pR2 = [rightX, baseY - rUp];
  const pR3 = [rightX + rTop, baseY - rUp];
  const pR4 = [rightX + rTop, baseY - rUp + rHook];

  const Dim = ({ x1, y1, x2, y2, label, vertical, offset = 14 }) => {
    if (vertical) {
      return (
        <g>
          <line x1={x1} y1={y1} x2={x1} y2={y2} stroke="#777" strokeWidth="1" />
          <line x1={x1 - 4} y1={y1} x2={x1 + 4} y2={y1} stroke="#777" strokeWidth="1" />
          <line x1={x1 - 4} y1={y2} x2={x1 + 4} y2={y2} stroke="#777" strokeWidth="1" />
          <text x={x1 - offset} y={(y1 + y2) / 2} fontSize="9" fill="#999" fontFamily="monospace" textAnchor="middle" transform={`rotate(-90 ${x1 - offset} ${(y1 + y2) / 2})`}>{label}</text>
        </g>
      );
    }
    return (
      <g>
        <line x1={x1} y1={y1} x2={x2} y2={y1} stroke="#777" strokeWidth="1" />
        <line x1={x1} y1={y1 - 4} x2={x1} y2={y1 + 4} stroke="#777" strokeWidth="1" />
        <line x1={x2} y1={y1 - 4} x2={x2} y2={y1 + 4} stroke="#777" strokeWidth="1" />
        <text x={(x1 + x2) / 2} y={y1 - offset + 8} fontSize="9" fill="#999" fontFamily="monospace" textAnchor="middle">{label}</text>
      </g>
    );
  };

  return (
    <div className="bg-neutral-900/40 border border-neutral-800 rounded-sm px-4 py-4">
      <p className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold mb-3">Profil-Referenz: Herkunft der Falz-Zugaben</p>
      <svg viewBox="0 0 540 240" className="w-full h-56">
        {/* Blech-Kontur */}
        <polyline
          points={`${pL3.join(",")} ${pL2.join(",")} ${pL1.join(",")} ${pR1.join(",")} ${pR2.join(",")} ${pR3.join(",")} ${pR4.join(",")}`}
          fill="none" stroke="white" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round"
        />

        {/* Unterfalz Bemaßung */}
        <Dim x1={leftX - 30} y1={baseY} x2={leftX - 30} y2={baseY - lUp} label="25 mm" vertical offset={12} />
        <Dim x1={leftX} y1={baseY - lUp - 16} x2={leftX + lLip} y2={baseY - lUp - 16} label="10 mm" />
        <line x1={leftX} y1={baseY} x2={leftX} y2={baseY - lUp} stroke="white" strokeWidth="3" strokeLinecap="round" />
        <path d={`M ${leftX + 16} ${baseY} A 16 16 0 0 0 ${leftX} ${baseY - 16}`} fill="none" stroke="#777" strokeWidth="1" />
        <text x={leftX + 6} y={baseY - 6} fontSize="9" fill="#666" fontFamily="monospace">90°</text>

        {/* Oberfalz Bemaßung */}
        <Dim x1={rightX - 30} y1={baseY} x2={rightX - 30} y2={baseY - rUp} label="25 mm" vertical offset={12} />
        <Dim x1={rightX} y1={baseY - rUp - 16} x2={rightX + rTop} y2={baseY - rUp - 16} label="11 mm" />
        <Dim x1={rightX + rTop + 20} y1={baseY - rUp} x2={rightX + rTop + 20} y2={baseY - rUp + rHook} label="9 mm" vertical offset={-12} />
        <path d={`M ${rightX - 16} ${baseY} A 16 16 0 0 1 ${rightX} ${baseY - 16}`} fill="none" stroke="#777" strokeWidth="1" />
        <text x={rightX - 22} y={baseY - 6} fontSize="9" fill="#666" fontFamily="monospace">88°</text>

        {/* Deckbreite unten */}
        <Dim x1={leftX} y1={baseY + 26} x2={rightX} y2={baseY + 26} label="Deckbreite – siehe Rechner-Ergebnis" offset={-16} />
      </svg>
      <div className="flex justify-between text-[11px] mt-1">
        <span style={{ color: RED }} className="font-semibold">Unterfalz: 25 + 10 = {falzUnten} mm</span>
        <span style={{ color: "#8ab4f8" }} className="font-semibold">Oberfalz: 25 + 11 + 9 = {falzOben} mm</span>
      </div>
    </div>
  );
}

function ConeViz({ n, r1, r2, s }) {
  const w = 220, h = 140;
  const scale = r1 > 0 ? 70 / r1 : 1;
  const bw = r1 * scale;
  const tw = r2 * scale;
  const baseY = 120, topY = 20;
  const cx = w / 2;
  const count = Math.min(n, 16);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-36 mx-auto max-w-[240px] block">
      <polygon
        points={`${cx - bw},${baseY} ${cx + bw},${baseY} ${cx + tw},${topY} ${cx - tw},${topY}`}
        fill="none" stroke="#444" strokeWidth="1.5"
      />
      {Array.from({ length: count + 1 }).map((_, i) => {
        const t = i / count;
        const xb = cx - bw + t * 2 * bw;
        const xt = cx - tw + t * 2 * tw;
        return <line key={i} x1={xb} y1={baseY} x2={xt} y2={topY} stroke={i % 4 === 0 ? RED : "#555"} strokeWidth="1" />;
      })}
    </svg>
  );
}

function MaterialBedarf({ n, breite, laenge, hinweis }) {
  const [modus, setModus] = useState("coil");
  const [tafelB, setTafelB] = useState(2000);
  const [tafelH, setTafelH] = useState(1000);

  const coil = useMemo(() => {
    const laufmeter = (n * laenge) / 1000;
    return { laufmeter, breiteEmpf: Math.ceil(breite / 10) * 10 };
  }, [n, breite, laenge]);

  const tafel = useMemo(() => {
    const orientA = Math.floor(tafelH / breite) * Math.floor(tafelB / laenge);
    const orientB = Math.floor(tafelB / breite) * Math.floor(tafelH / laenge);
    const proTafel = Math.max(orientA, orientB, 0);
    const passtNicht = breite > Math.max(tafelB, tafelH) || laenge > Math.max(tafelB, tafelH);
    const anzahl = proTafel > 0 ? Math.ceil(n / proTafel) : null;
    return { proTafel, anzahl, passtNicht, besteOrientierung: orientB > orientA ? "quer" : "längs" };
  }, [n, breite, laenge, tafelB, tafelH]);

  return (
    <div>
      <SectionLabel n="03" title="Materialbedarf" />
      <div className="no-print flex gap-2 mb-3">
        <button onClick={() => setModus("coil")} className={`flex-1 py-2 text-[11px] uppercase tracking-wide rounded-sm border ${modus === "coil" ? "border-[color:var(--red)] text-white" : "border-neutral-800 text-neutral-500"}`}>Coil</button>
        <button onClick={() => setModus("tafel")} className={`flex-1 py-2 text-[11px] uppercase tracking-wide rounded-sm border ${modus === "tafel" ? "border-[color:var(--red)] text-white" : "border-neutral-800 text-neutral-500"}`}>Tafel</button>
      </div>

      {modus === "coil" ? (
        <div className="bg-neutral-900/50 border border-neutral-800 rounded-sm px-4">
          <ResultRow label="Empf. Coilbreite" value={fmt(coil.breiteEmpf, 0)} unit="mm" big />
          <ResultRow label="Gesamtlänge Coil" value={fmt(coil.laufmeter, 2)} unit="lfm" />
          <ResultRow label="Bahnen aus diesem Coil" value={n} unit="Stk" />
        </div>
      ) : (
        <div className="bg-neutral-900/50 border border-neutral-800 rounded-sm px-4">
          <div className="grid grid-cols-2 gap-3 py-3 border-b border-neutral-800">
            <NumberField label="Tafel Breite" unit="mm" value={tafelB} onChange={setTafelB} />
            <NumberField label="Tafel Höhe" unit="mm" value={tafelH} onChange={setTafelH} />
          </div>
          {tafel.passtNicht ? (
            <p className="text-[12px] text-amber-500 py-3">Bahn ({fmt(breite,0)}×{fmt(laenge,0)} mm) passt in keiner Richtung auf eine Tafel — Coil verwenden oder Bahnen splicen.</p>
          ) : (
            <>
              <ResultRow label="Anzahl Tafeln" value={tafel.anzahl} unit="Stk" big />
              <ResultRow label="Bahnen pro Tafel" value={tafel.proTafel} unit="Stk" />
              <ResultRow label="Beste Ausrichtung" value={tafel.besteOrientierung} unit="" />
            </>
          )}
        </div>
      )}
      {hinweis && <p className="text-[11px] text-neutral-600 mt-2">{hinweis}</p>}
    </div>
  );
}

function Stueckliste({ n, columns, hinweis }) {
  const rows = Array.from({ length: n });
  return (
    <div>
      <SectionLabel n="04" title="Stückliste" />
      <div className="border border-neutral-800 rounded-sm max-h-64 overflow-y-auto">
        <table className="w-full text-[11px] font-mono">
          <thead>
            <tr className="bg-neutral-900">
              <th className="text-left px-2 py-1.5 text-neutral-500 font-normal">Nr.</th>
              {columns.map((c) => (
                <th key={c.label} className="text-left px-2 py-1.5 text-neutral-500 font-normal">{c.label}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((_, i) => (
              <tr key={i} className="border-t border-neutral-800">
                <td className="px-2 py-1 text-neutral-400">{i + 1}</td>
                {columns.map((c) => (
                  <td key={c.label} className="px-2 py-1 text-white">{c.get(i)}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {hinweis && <p className="text-[11px] text-neutral-600 mt-2">{hinweis}</p>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StehfalzRechner />);
</script>
